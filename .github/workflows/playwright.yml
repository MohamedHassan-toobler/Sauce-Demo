name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: e2e
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Install Allure CLI
        working-directory: e2e
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        working-directory: e2e
        run: allure generate allure-results --clean -o allure-report

      # -------- Prepare combined site --------
      - name: Prepare site
        if: always()
        run: |
          mkdir -p site/playwright
          mkdir -p site/allure
          cp -r playwright-report/* site/playwright/ || true
          cp -r allure-report/* site/allure/ || true
          echo '<h1>Test Reports</h1>' > site/index.html
          echo '<a href="./playwright/index.html">Playwright Report</a><br>' >> site/index.html
          echo '<a href="./allure/index.html">Allure Report</a>' >> site/index.html

      # Upload artifact for Pages
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
